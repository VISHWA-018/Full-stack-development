server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true # Automatic routing based on registered services
      routes:
        - id: manual-user
          uri: lb://USER-MS
          predicates:
            - Path=/api/user/**
        - id: manual-account
          uri: lb://ACCOUNTMNG-MS
          predicates:
            - Path=/api/account/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
