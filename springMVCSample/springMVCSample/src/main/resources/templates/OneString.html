<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>String Page</title>

<style>

body{
    font-family: Arial;
    background:#f0f8ff;
    text-align:center;
    padding-top:100px;
}

.box{
    background:white;
    padding:40px;
    width:300px;
    margin:auto;
    border-radius:10px;
    box-shadow:0px 0px 8px gray;
}

h2{
    color:#2c3e50;
}

</style>

</head>

<body>

<div class="box">

<h2>Message from Controller</h2>

<p th:text="${str}"></p>

</div>

</body>

</html>
