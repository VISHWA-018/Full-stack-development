<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Person Information</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;
}

.container{
    width:400px;
    margin:100px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

h1{
    text-align:center;
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
}

</style>

</head>

<body>

<div class="container">

<h1>Person Details</h1>

<p>ID: <span th:text="${person.id}"></span></p>
<p>Name: <span th:text="${person.nameString}"></span></p>

<hr>

<form>

<label>ID</label>
<input type="text" th:value="${person.id}" readonly>

<label>Name</label>
<input type="text" th:value="${person.nameString}">

</form>

</div>

</body>

</html>
